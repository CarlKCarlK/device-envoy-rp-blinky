[env]
DEFMT_LOG = "info"

[target.thumbv6m-none-eabi]
runner = "probe-rs run --chip=RP2040"
rustflags = [
  "-C",
  "link-arg=-Tlink.x",
  "-C",
  "link-arg=-Tdefmt.x",
  "-C",
  "link-arg=--gc-sections",
]

[target.thumbv8m.main-none-eabihf]
runner = "probe-rs run --chip=RP235x"
rustflags = [
  "-C",
  "link-arg=-Tlink.x",
  "-C",
  "link-arg=-Tlink-rp.x",
  "-C",
  "link-arg=-Tdefmt.x",
  "-C",
  "link-arg=--gc-sections",
]

[alias]
xtask = "run --manifest-path xtask/Cargo.toml --"
